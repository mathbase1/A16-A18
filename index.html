<script>
const TOPICS = [
  { code:"A16", name:"Quadratic graphs" },
  { code:"A17", name:"Using formulae" },
  { code:"A18", name:"Rearrange formulae" }
];
const MNS = "http://www.w3.org/1998/Math/MathML";
function hashToUint32(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function cryptoSeed(){if(window.crypto&&crypto.getRandomValues){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]>>>0;}return (Math.random()*2**32)>>>0;}
function mulberry32(seed){let t=seed>>>0;return function(){t+=0x6D2B79F5;let x=t;x=Math.imul(x^(x>>>15),x|1);x^=x+Math.imul(x^(x>>>7),x|61);return ((x^(x>>>14))>>>0)/4294967296;};}
function makeRng(seedLike){const seed=(seedLike===undefined||seedLike===null||seedLike==="")?cryptoSeed():(typeof seedLike==="number"?(seedLike>>>0):hashToUint32(String(seedLike)));const r=mulberry32(seed);return{seed,float:()=>r(),int:(min,max)=>Math.floor(r()*(Math.floor(max)-Math.ceil(min)+1))+Math.ceil(min),choice:(arr)=>arr[Math.floor(r()*arr.length)],shuffle:(arr)=>{const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}};}
function fmt(x,maxDp=6){const n=Number(x);if(!Number.isFinite(n))return String(x);return n.toFixed(maxDp).replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1');}
function fmt2(x){return Number(x).toFixed(2);}
function asNum(v){let s=String(v??"").trim().replace(/,/g,"").replace(/π/gi,"pi");if(!s)return NaN;s=s.replace(/÷/g,"/");const frac=s.match(/^\(?\s*([+-]?\d+(?:\.\d+)?)\s*\)?\s*\/\s*\(?\s*([+-]?\d+(?:\.\d+)?)\s*\)?$/);if(frac){const n=Number(frac[1]),d=Number(frac[2]);if(Number.isFinite(n)&&Number.isFinite(d)&&Math.abs(d)>1e-12)return n/d;}const x=Number(s);return Number.isFinite(x)?x:NaN;}
function close(a,b,tol=1e-8){return Math.abs(a-b)<=tol;}
function escapeHtml(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escapeAttr(s){return String(s??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function textLine(text){return `<div class="textline">${escapeHtml(text)}</div>`;}
function rawTextLine(html){return `<div class="textline">${html}</div>`;}
function letters(i){return `(${String.fromCharCode(97+i)})`;}
function paperTagHtml(paperMode){return paperMode==="calc"?`<span class="paper-tag calc">CALCULATOR</span>`:`<span class="paper-tag nc">NON-CALCULATOR</span>`;}
function markClassFromMarks(marks,maxMarks){if(marks===maxMarks)return"good";if(marks===0)return"bad";return"partial";}
function highlightEls(els,cls){(els||[]).forEach(el=>{if(!el)return;el.classList.remove("ok","bad","partial-input");if(cls==="good")el.classList.add("ok");else if(cls==="partial")el.classList.add("partial-input");else el.classList.add("bad");});}
function mi(s){if(String(s).toLowerCase()==="pi")return`<mi>π</mi>`;if(String(s).toLowerCase()==="rho")return`<mi>ρ</mi>`;return`<mi>${escapeHtml(s)}</mi>`;}
function mn(n){return`<mn>${escapeHtml(fmt(n))}</mn>`;}function mo(s){const map={"-":"−","*":"×","/":"÷","<=":"≤",">=":"≥"};return`<mo>${escapeHtml(map[s]||s)}</mo>`;}function mrow(...p){return`<mrow>${p.join("")}</mrow>`;}function msup(b,e){return`<msup>${b}${e}</msup>`;}function mfrac(n,d){return`<mfrac><mrow>${n}</mrow><mrow>${d}</mrow></mfrac>`;}function msqrt(b){return`<msqrt><mrow>${b}</mrow></msqrt>`;}function mcbrt(b){return`<mroot><mrow>${b}</mrow><mn>3</mn></mroot>`;}function mathML(body,display="inline"){const cls=display==="block"?"mathline":"math-inline";return`<span class="${cls}"><math xmlns="${MNS}" display="${display}"><mrow>${body}</mrow></math></span>`;}
function stripOuter(s){s=String(s).trim();while(s.startsWith("(")&&s.endsWith(")")){let d=0,ok=true;for(let i=0;i<s.length;i++){if(s[i]==="(")d++;else if(s[i]===")"){d--;if(d===0&&i<s.length-1){ok=false;break;}}}if(ok)s=s.slice(1,-1).trim();else break;}return s;}

    const expected = ask === 'b' ? b : h;
    const partials = ask === 'b'
      ? [{value:2*A, marks:1, message:'Undo the one half first, then divide by h.'},{value:2*A/h, marks:Math.min(2, marks-1), message:'Now subtract a to find b.'}]
      : [{value:2*A, marks:1, message:'Undo the one half first.'},{value:2*A/(a+b), marks:Math.min(2, marks-1), message:'Correct method. Check the arithmetic.'}];
    return a17NumberPart(prompt, expected, marks, 'cm', calc && !a17IsInt(expected), partials, 'Check the rearrangement of the trapezium area formula.');
  }

  function a17PrismPart(rng, calc, marks){
    const A = calc ? a17PickDec(rng, 5, 12) : rng.int(5, 12);
    const h = calc ? a17PickDec(rng, 2, 8) : rng.int(2, 8);
    const V = A*h;
    const ask = rng.choice(['V','A','h']);
    if(ask === 'V'){
      return a17NumberPart(a17Prompt('V=A*h', [a17VarDesc('A','area of the cross-section'), a17VarDesc('h','length of the prism')], [['A', A, 'cm²'], ['h', h, 'cm']], 'find V in cm³.', calc && !a17IsInt(V) ? 'Give your answer to 2 decimal places.' : ''), V, marks, 'cm³', calc && !a17IsInt(V), [], 'Check the prism volume formula.');
    }
    const prompt = ask === 'A'
      ? a17Prompt('V=A*h', [a17VarDesc('A','area of the cross-section'), a17VarDesc('h','length of the prism')], [['V', V, 'cm³'], ['h', h, 'cm']], 'find A in cm².', calc && !a17IsInt(A) ? 'Give your answer to 2 decimal places.' : '')
      : a17Prompt('V=A*h', [a17VarDesc('A','area of the cross-section'), a17VarDesc('h','length of the prism')], [['V', V, 'cm³'], ['A', A, 'cm²']], 'find h in cm.', calc && !a17IsInt(h) ? 'Give your answer to 2 decimal places.' : '');
    const expected = ask === 'A' ? A : h;
    const divisor = ask === 'A' ? h : A;
    return a17NumberPart(prompt, expected, marks, ask === 'A' ? 'cm²' : 'cm', calc && !a17IsInt(expected), [{value:V*divisor, marks:1, message:'You multiplied instead of dividing.'}], 'Check the prism volume rearrangement.');
  }

  function a17CuboidPart(rng, calc, marks){
    const L = calc ? a17PickDec(rng, 4, 8) : rng.int(4, 8);
    const w = calc ? a17PickDec(rng, 3, 7) : rng.int(3, 7);
    const h = calc ? a17PickDec(rng, 3, 9) : rng.int(3, 9);
    const V = L*w*h;
    const ask = rng.choice(['V','h']);
    if(ask === 'V'){
      return a17NumberPart(a17Prompt('V=L*w*h', [], [['L', L, 'cm'], ['w', w, 'cm'], ['h', h, 'cm']], 'find V in cm³.', calc && !a17IsInt(V) ? 'Give your answer to 2 decimal places.' : ''), V, marks, 'cm³', calc && !a17IsInt(V), [], 'Check the cuboid volume formula.');
    }
    return a17NumberPart(a17Prompt('V=L*w*h', [], [['V', V, 'cm³'], ['L', L, 'cm'], ['w', w, 'cm']], 'find h in cm.', calc && !a17IsInt(h) ? 'Give your answer to 2 decimal places.' : ''), h, marks, 'cm', calc && !a17IsInt(h), [{value:V/L, marks:1, message:'Now divide by w as well to find h.'}], 'Check the cuboid volume rearrangement.');
  }

  function a17CircumferencePiPart(rng, calc, marks){
    const rVal = calc ? a17PickDec(rng, 2, 9) : rng.int(2, 12);
    if(calc){
      const C = 2*Math.PI*rVal;
      return a17NumberPart(a17Prompt('C=2*pi*r', [a17VarDesc('r','radius')], [['r', rVal, 'cm']], 'find C in cm.', 'Give your answer to 2 decimal places.'), C, marks, 'cm', true, [{value:Math.PI*rVal, marks:1, message:'You found πr. Remember the factor of 2.'}], 'Check the circumference formula.');
    }
    return a17PiPart(a17Prompt('C=2*pi*r', [a17VarDesc('r','radius')], [['r', rVal, 'cm']], 'find C in cm. Give your answer in terms of π.', ''), 2*rVal, marks, 'cm', [{value:rVal, marks:0, message:'You used r instead of 2r.'}]);
  }

  function a17CircleAreaPart(rng, calc, marks){
    const rVal = calc ? a17PickDec(rng, 2, 9) : rng.int(2, 10);
    if(calc){
      const A = Math.PI*rVal*rVal;
      return a17NumberPart(a17Prompt('A=pi*r^2', [a17VarDesc('r','radius')], [['r', rVal, 'cm']], 'find A in cm².', 'Give your answer to 2 decimal places.'), A, marks, 'cm²', true, [{value:rVal*rVal, marks:1, message:'Now multiply by π.'}], 'Check the circle area formula.');
    }
    return a17PiPart(a17Prompt('A=pi*r^2', [a17VarDesc('r','radius')], [['r', rVal, 'cm']], 'find A in cm². Give your answer in terms of π.', ''), rVal*rVal, marks, 'cm²', []);
  }

  function a17OneMarkPart(rng, calc){
    return rng.choice([
      () => a17ForcePart(rng, calc, 1),
      () => a17SquarePart(rng, calc, 1),
      () => a17CubePart(rng, calc, 1),
      () => a17RectanglePart(rng, calc, 1),
      () => a17SpeedPart(rng, calc, 1),
      () => a17DensityPart(rng, calc, 1),
      () => a17PressurePart(rng, calc, 1),
      () => a17CircumferencePiPart(rng, calc, 1)
    ])();
  }
  function a17TwoMarkPart(rng, calc){
    return rng.choice([
      () => a17SquarePart(rng, calc, 2),
      () => a17CubePart(rng, calc, 2),
      () => a17SpeedPart(rng, calc, 2),
      () => a17DensityPart(rng, calc, 2),
      () => a17PressurePart(rng, calc, 2),
      () => a17CircumferencePiPart(rng, calc, 2),
      () => a17CircleAreaPart(rng, calc, 2)
    ])();
  }
  function a17ThreeMarkPart(rng, calc){
    return rng.choice([
      () => a17RectanglePart(rng, calc, 3),
      () => a17TrianglePart(rng, calc, 3),
      () => a17TrapeziumPart(rng, calc, 3),
      () => a17PrismPart(rng, calc, 3),
      () => a17CuboidPart(rng, calc, 3),
      () => a17SpeedPart(rng, calc, 3),
      () => a17DensityPart(rng, calc, 3),
      () => a17PressurePart(rng, calc, 3)
    ])();
  }

  buildA17Question = function(marksTotal, paperMode, rng){
    const calc = paperMode === 'calc';
    if(marksTotal === 1) return makeQuestion('A17', '1M', paperMode, [a17OneMarkPart(rng, calc)]);
    if(marksTotal === 2) return makeQuestion('A17', '2M', paperMode, [a17TwoMarkPart(rng, calc)]);
    if(marksTotal === 3) return makeQuestion('A17', '3M', paperMode, [a17OneMarkPart(rng, calc), a17TwoMarkPart(rng, calc)]);
    if(marksTotal === 4) return makeQuestion('A17', '4M', paperMode, [a17OneMarkPart(rng, calc), a17ThreeMarkPart(rng, calc)]);
    return makeQuestion('A17', '5M', paperMode, [a17TwoMarkPart(rng, calc), a17ThreeMarkPart(rng, calc)]);
  };

  // --- A18 randomised generators ---
  const A18_FAMILIES = [
    ['x','y','z'],
    ['p','q','r'],
    ['n','k','m'],
    ['a','b','c'],
    ['A','B','P']
  ];
  const A18_NUMS = [1,2,3,4,5,6,7,8,9,1.5,2.5,3.5,4.5,5.5,6.5,7.5,8.5];
  function a18Num(rng, positiveOnly){
    let v = rng.choice(A18_NUMS);
    if(!positiveOnly && rng.float() < 0.45) v = -v;
    return Number(fmt(v));
  }
  function a18Pos(rng, minVal){
    const pool = A18_NUMS.filter(v => v >= (minVal || 1));
    return Number(fmt(rng.choice(pool.length ? pool : A18_NUMS)));
  }
  function a18S(n){ return Number(n) >= 0 ? `+${fmt(n)}` : fmt(n); }
  function a18Family(rng){ return rng.choice(A18_FAMILIES).slice(); }
  function a18PickNames(rng){
    const fam = a18Family(rng);
    return {u:fam[0], v:fam[1] || 'y', w:fam[2] || 'z'};
  }
  function a18Linear1(rng){
    const n = a18PickNames(rng), c = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${n.u}${a18S(c)}`, `${n.v}${a18S(-c)}`, 1);
  }
  function a18Mult1(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2);
    return partA18(n.u, `${n.v}=${fmt(a)}*${n.u}`, `${n.v}/${fmt(a)}`, 1);
  }
  function a18Product1(rng){
    const n = a18PickNames(rng);
    return partA18(n.u, `${n.w}=${n.u}*${n.v}`, `${n.w}/${n.v}`, 1);
  }
  function a18Square1(rng){
    const n = a18PickNames(rng);
    return partA18(n.u, `${n.v}=${n.u}^2`, `sqrt(${n.v})`, 1, {extra:'where the subject is positive'});
  }
  function a18Cube1(rng){
    const n = a18PickNames(rng);
    return partA18(n.u, `${n.v}=${n.u}^3`, `cbrt(${n.v})`, 1);
  }
  function a18Sqrt1(rng){
    const n = a18PickNames(rng);
    return partA18(n.u, `${n.v}=sqrt(${n.u})`, `${n.v}^2`, 1);
  }
  function a18Cbrt1(rng){
    const n = a18PickNames(rng);
    return partA18(n.u, `${n.v}=cbrt(${n.u})`, `${n.v}^3`, 1);
  }
  function a18Linear2(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${fmt(a)}*${n.u}${a18S(b)}`, `(${n.v}${a18S(-b)})/${fmt(a)}`, 2, {
      partials:[
        {expr:`${n.v}${a18S(-b)}`, marks:1, message:`You moved ${fmt(Math.abs(b))}; now divide by ${fmt(a)}.`},
        {expr:`${n.v}/${fmt(a)}${a18S(-b)}`, marks:1, message:`Divide the whole of ${n.v} ${b>=0?'−':'+'} ${fmt(Math.abs(b))} by ${fmt(a)}.`}
      ]
    });
  }
  function a18DivShift2(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${n.u}/${fmt(a)}${a18S(b)}`, `${fmt(a)}*(${n.v}${a18S(-b)})`, 2, {
      partials:[
        {expr:`${n.v}${a18S(-b)}`, marks:1, message:`You moved ${fmt(Math.abs(b))}; now multiply by ${fmt(a)}.`},
        {expr:`${fmt(a)}*${n.v}${a18S(-b)}`, marks:1, message:`Multiply the whole bracket by ${fmt(a)}.`}
      ]
    });
  }
  function a18HalfArea2(rng){
    const n = a18PickNames(rng);
    return partA18(n.u, `${n.w}=1/2*${n.u}*${n.v}`, `2*${n.w}/${n.v}`, 2, {
      partials:[{expr:`${n.w}/${n.v}`, marks:1, message:'Undo the one half by multiplying by 2.'}]
    });
  }
  function a18Square2(rng){
    const n = a18PickNames(rng);
    return partA18(n.u, `${n.v}=${n.u}^2`, `±sqrt(${n.v})`, 2, {extra:'Give both possible values of the subject', pm:true, pmBase:`sqrt(${n.v})`, partials:[{expr:`sqrt(${n.v})`, marks:1, message:'Include both possible signs.'}]});
  }
  function a18ScaledSquare2(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2);
    return partA18(n.u, `${n.v}=${fmt(a)}*${n.u}^2`, `sqrt(${n.v}/${fmt(a)})`, 2, {extra:'where the subject is positive', partials:[{expr:`${n.v}/${fmt(a)}`, marks:1, message:`You divided by ${fmt(a)}; now take the square root.`}]});
  }
  function a18ShiftSqrt2(rng){
    const n = a18PickNames(rng), b = a18Pos(rng, 1);
    return partA18(n.u, `${n.v}=sqrt(${n.u})+${fmt(b)}`, `(${n.v}-${fmt(b)})^2`, 2, {partials:[{expr:`${n.v}-${fmt(b)}`, marks:1, message:'You isolated the square root; now square both sides.'}]});
  }
  function a18ScaledCbrt2(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2);
    return partA18(n.u, `${n.v}=${fmt(a)}*cbrt(${n.u})`, `(${n.v}/${fmt(a)})^3`, 2, {partials:[{expr:`${n.v}/${fmt(a)}`, marks:1, message:'You divided correctly; now cube both sides.'}]});
  }
  function a18Bracket3(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Pos(rng, 1), c = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${fmt(a)}*(${n.u}-${fmt(b)})${a18S(c)}`, `(${n.v}${a18S(-c)})/${fmt(a)}+${fmt(b)}`, 3, {
      partials:[
        {expr:`${n.v}${a18S(-c)}`, marks:1, message:`Undo the ${c>=0?'+':'−'}${fmt(Math.abs(c))} first.`},
        {expr:`(${n.v}${a18S(-c)})/${fmt(a)}`, marks:2, message:`Now add ${fmt(b)} to finish.`}
      ]
    });
  }
  function a18Trapezium3(rng){
    const n = a18PickNames(rng);
    return partA18(n.v, `${n.w}=1/2*(${n.u}+${n.v})*${n.u}`, `2*${n.w}/${n.u}-${n.u}`, 3, {
      partials:[
        {expr:`2*${n.w}`, marks:1, message:'Undo the one half first, then divide by the outside term.'},
        {expr:`2*${n.w}/${n.u}`, marks:2, message:`Now subtract ${n.u} to make ${n.v} the subject.`}
      ]
    });
  }
  function a18MixedFrac3(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Pos(rng, 1), c = a18Num(rng, false);
    return partA18(n.u, `${n.v}=(${n.u}-${fmt(a)}*${n.w})/${fmt(b)}${a18S(c)}`, `${fmt(b)}*(${n.v}${a18S(-c)})+${fmt(a)}*${n.w}`, 3);
  }
  function a18ShiftSquare3(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${fmt(a)}*${n.u}^2${a18S(b)}`, `sqrt((${n.v}${a18S(-b)})/${fmt(a)})`, 3, {extra:'where the subject is positive'});
  }
  function a18ScaledSqrt3(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${fmt(a)}*sqrt(${n.u})${a18S(b)}`, `((${n.v}${a18S(-b)})/${fmt(a)})^2`, 3, {
      partials:[{expr:`(${n.v}${a18S(-b)})/${fmt(a)}`, marks:2, message:'You isolated the square root correctly; now square both sides.'}]
    });
  }
  function a18ShiftCube3(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${fmt(a)}*${n.u}^3${a18S(b)}`, `cbrt((${n.v}${a18S(-b)})/${fmt(a)})`, 3);
  }
  function a18ScaledCbrt3(rng){
    const n = a18PickNames(rng), a = a18Pos(rng, 2), b = a18Num(rng, false);
    return partA18(n.u, `${n.v}=${fmt(a)}*cbrt(${n.u})${a18S(b)}`, `((${n.v}${a18S(-b)})/${fmt(a)})^3`, 3);
  }
  function a18OneMark(rng){ return rng.choice([() => a18Linear1(rng), () => a18Mult1(rng), () => a18Product1(rng), () => a18Square1(rng), () => a18Cube1(rng), () => a18Sqrt1(rng), () => a18Cbrt1(rng)])(); }
  function a18TwoMark(rng){ return rng.choice([() => a18Linear2(rng), () => a18DivShift2(rng), () => a18HalfArea2(rng), () => a18Square2(rng), () => a18ScaledSquare2(rng), () => a18ShiftSqrt2(rng), () => a18ScaledCbrt2(rng)])(); }
  function a18ThreeMark(rng){ return rng.choice([() => a18Bracket3(rng), () => a18Trapezium3(rng), () => a18MixedFrac3(rng), () => a18ShiftSquare3(rng), () => a18ScaledSqrt3(rng), () => a18ShiftCube3(rng), () => a18ScaledCbrt3(rng)])(); }

  buildA18Question = function(marksTotal, paperMode, rng){
    if(marksTotal === 1) return makeQuestion('A18', '1M', paperMode, [a18OneMark(rng)]);
    if(marksTotal === 2) return makeQuestion('A18', '2M', paperMode, [a18TwoMark(rng)]);
    if(marksTotal === 3) return makeQuestion('A18', '3M', paperMode, [a18ThreeMark(rng)]);
    if(marksTotal === 4){
      return rng.float() < 0.5
        ? makeQuestion('A18', '4M', paperMode, [a18OneMark(rng), a18ThreeMark(rng)])
        : makeQuestion('A18', '4M', paperMode, [a18TwoMark(rng), a18TwoMark(rng)]);
    }
    return rng.float() < 0.5
      ? makeQuestion('A18', '5M', paperMode, [a18TwoMark(rng), a18ThreeMark(rng)])
      : makeQuestion('A18', '5M', paperMode, [a18OneMark(rng), a18TwoMark(rng), a18TwoMark(rng)]);
  };
})();

</script>
